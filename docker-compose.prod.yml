services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: azeroth_nexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - backup_data:/var/backups/azerothnexus

  worker:
    build:
      context: ./apps/api
    command: ["dramatiq", "app.tasks.jobs"]
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
    env_file:
      - .env
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
      INTERNAL_API_BASE_URL: http://api:8000
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  backup_data:
